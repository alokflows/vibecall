name: Update Release APK

on:
  push:
    branches:
      - master

permissions:
  contents: write

# Only build the latest push; cancel any earlier run still in progress so two
# runs never fight over the release tag.
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Install dependencies and build web
        run: |
          npm ci
          npm run build
          npx cap sync android
          
      - name: Build Android APK
        working-directory: ./android
        run: bash ./gradlew assembleRelease
        
      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk VibeCall-v2.0.apk

      # Clear the old v1.0 release and any existing v2.0 so the new one is
      # freshly published "now" with a clean, single release on the page.
      - name: Clean up previous releases
        run: |
          gh release delete v1.0 --cleanup-tag --yes || true
          gh release delete v2.0 --cleanup-tag --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish v2.0 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0
          name: Vibe Call v2.0
          files: VibeCall-v2.0.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
