name: Update Release APK

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Install dependencies and build web
        run: |
          npm ci
          npm run build
          npx cap sync android
          
      - name: Build Android APK
        working-directory: ./android
        run: bash ./gradlew assembleRelease
        
      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk VibeCall-v1.0.apk

      - name: Publish v1.0 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: Vibe Call v1.0
          files: VibeCall-v1.0.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
